<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona 3 Reload Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --p3r-cyan: #5cdbfe;
            --p3r-pink: #ff1461;
            --p3r-white: #ffffff;
            --p3r-black: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--p3r-black); /* Fallback color */
            font-family: 'Bebas Neue', 'Noto Sans JP', sans-serif;
            overflow: hidden;
            color: var(--p3r-white);
            user-select: none;
        }

        /* --- Fullscreen Video Background --- */
        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
        }

        /* Vertical giant text on the left */
        .vertical-bg-text-container {
            position: absolute;
            left: 0px;
            top: 0;
            bottom: 0;
            display: flex;
            align-items: center; 
            justify-content: center;
            z-index: 4;
            pointer-events: none;
        }

        .vertical-bg-text {
            font-size: 12vh;
            color: var(--p3r-black);
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            line-height: 0.8;
            letter-spacing: -5px;
            opacity: 0.9;
            margin-left: 10px;
        }

        /* Top left data box mimicking the "current wallet" */
        .top-left-box {
            position: absolute;
            top: 30px;
            left: 80px; 
            border: 2px solid var(--p3r-black);
            background: var(--p3r-white);
            color: var(--p3r-black);
            padding: 5px 25px 5px 15px;
            z-index: 10;
        }

        /* Menu Container */
        .menu-container {
            position: absolute;
            top: 50%;
            left: 45%;
            transform: translate(-30%, -50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        /* Menu Buttons Base */
        .p3r-btn {
            position: relative;
            background: none;
            border: none;
            color: var(--p3r-cyan);
            font-size: 4rem;
            font-family: 'Bebas Neue', 'Noto Sans JP', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            transform: skew(-15deg);
            text-align: left;
            padding: 0 10px;
            cursor: pointer;
            transition: all 0.1s;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .p3r-btn:not(.active):hover {
            color: var(--p3r-white);
            transform: skew(-15deg) scale(1.05) translateX(10px);
            text-shadow: 0 0 10px rgba(92, 219, 254, 0.8);
        }

        .p3r-btn.active {
            color: var(--p3r-black);
            text-shadow: none;
            transform: skew(-15deg) scale(1.1) translateX(20px);
            z-index: 20;
        }

        .p3r-btn.active .bg-pink {
            position: absolute;
            top: 50%;
            left: -10%;
            width: 120%;
            height: 140%;
            background-color: var(--p3r-pink);
            transform: translateY(-50%) skew(25deg);
            z-index: -2;
            clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%);
            animation: sliceIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .p3r-btn.active .bg-white {
            position: absolute;
            top: 50%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-color: var(--p3r-white);
            transform: translateY(-50%) skew(10deg);
            z-index: -1;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }

        /* Content Display Box */
        .content-display {
            position: absolute;
            right: 5%;
            top: 50%;
            transform: translateY(-50%) skew(-5deg);
            width: 40%;
            background: rgba(0, 17, 68, 0.85);
            border: 2px solid var(--p3r-cyan);
            padding: 40px;
            z-index: 10;
            box-shadow: -10px 10px 0px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .content-display.visible {
            opacity: 1;
            pointer-events: all;
            animation: contentPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .content-text {
            font-size: 2.5rem;
            color: var(--p3r-white);
            line-height: 1.2;
            text-shadow: 2px 2px 0 var(--p3r-black);
            font-weight: 700;
        }

        /* Bottom Right Command Prompt */
        .command-prompt {
            position: absolute;
            bottom: 20px;
            right: 30px;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 15px;
            transform: skew(-10deg);
        }

        .cmd-text {
            font-size: 1.5rem;
            color: var(--p3r-white);
            text-shadow: 1px 1px 0 var(--p3r-black);
        }

        .lang-btn {
            background: var(--p3r-white);
            color: var(--p3r-black);
            border: none;
            padding: 5px 15px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 2px 2px 0 var(--p3r-cyan);
        }

        .lang-btn:hover {
            background: var(--p3r-cyan);
            color: var(--p3r-black);
            transform: scale(1.1);
        }

        /* Animations */
        @keyframes sliceIn {
            0% { width: 0%; opacity: 0; }
            100% { width: 120%; opacity: 1; }
        }

        @keyframes contentPop {
            0% { transform: translateY(-50%) skew(-5deg) scale(0.9) translateX(50px); opacity: 0; }
            100% { transform: translateY(-50%) skew(-5deg) scale(1) translateX(0); opacity: 1; }
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .vertical-bg-text {
                font-size: 8vh;
            }

            .top-left-box {
                top: 15px;
                left: 15px;
                padding: 5px 15px;
            }

            #box-title {
                font-size: 1.5rem;
            }

            .menu-container {
                left: 65%; /* Shift right to avoid character */
                transform: translate(-45%, -50%);
            }

            .p3r-btn {
                font-size: 2.2rem;
            }

            .content-display {
                width: 85%;
                right: 7.5%;
                top: 78%;
                transform: translateY(-50%) skew(-2deg);
                padding: 20px;
            }
            
            .content-display.visible {
                animation: contentPopMobile 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            }

            .content-text {
                font-size: 1.5rem;
            }

            .command-prompt {
                bottom: 10px;
                right: 10px;
                transform: scale(0.8) skew(-10deg);
                transform-origin: bottom right;
            }
        }

        @keyframes contentPopMobile {
            0% { transform: translateY(-50%) skew(-2deg) scale(0.9) translateX(20px); opacity: 0; }
            100% { transform: translateY(-50%) skew(-2deg) scale(1) translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Video Background -->
    <video class="bg-video" autoplay loop muted playsinline>
        <source src="ab.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <!-- Vertical Background Text (Wrapped in container to perfectly center vertically) -->
    <div class="vertical-bg-text-container">
        <div class="vertical-bg-text" id="bg-vertical-text">DEATH'S MODS</div>
    </div>

    <!-- Top Left Information Box (Wallet) -->
    <div class="top-left-box">
        <div class="text-3xl font-bold mb-1 tracking-wider" id="box-title">$250</div>
        <div class="text-xs tracking-widest text-gray-500 font-sans" id="box-subtitle">current wallet</div>
    </div>

    <!-- Central Menu -->
    <div class="menu-container">
        <button id="btn-what-we-do" class="p3r-btn" onclick="selectMenu('what-we-do', this)">
            <span class="bg-pink hidden"></span>
            <span class="bg-white hidden"></span>
            <span class="btn-text relative z-10">我々の目的</span>
        </button>
        
        <button id="btn-get-in-touch" class="p3r-btn" onclick="selectMenu('get-in-touch', this)">
            <span class="bg-pink hidden"></span>
            <span class="bg-white hidden"></span>
            <span class="btn-text relative z-10">お問い合わせ</span>
        </button>
        
        <button id="btn-about-us" class="p3r-btn" onclick="selectMenu('about-us', this)">
            <span class="bg-pink hidden"></span>
            <span class="bg-white hidden"></span>
            <span class="btn-text relative z-10">概要</span>
        </button>
    </div>

    <!-- Content Display -->
    <div id="content-display" class="content-display">
        <div class="text-xl text-[#5cdbfe] mb-2 font-bold tracking-widest" id="content-header">SYSTEM MESSAGE</div>
        <p id="content-text" class="content-text">
            運命を選択せよ
        </p>
    </div>

    <!-- Bottom Right Command Prompt (Language Toggle) -->
    <div class="command-prompt">
        <div class="flex flex-col text-right mr-2">
            <span class="cmd-text font-bold leading-none" id="cmd-main">Change Language</span>
            <span class="text-xs text-[#5cdbfe] font-sans tracking-widest">Command</span>
        </div>
        <button class="lang-btn" onclick="toggleLanguage()">
            <span class="mr-1 text-[#ff1461]">◂▸</span> <span id="lang-indicator">EN</span>
        </button>
    </div>

    <script>
        const translations = {
            jp: {
                bgText: "デスのモッズ",
                boxTitle: "$250",
                boxSubtitle: "現在の財布",
                cmdMain: "言語を変更",
                langIndicator: "EN",
                btnWhatWeDo: "我々の目的",
                btnGetInTouch: "お問い合わせ",
                btnAboutUs: "概要",
                contentHeader: "詳細情報",
                content: {
                    'what-we-do': 'VRAMを8GBから16GBへアップグレード',
                    'get-in-touch': 'xyz@gmail.com',
                    'about-us': 'xyz'
                }
            },
            en: {
                bgText: "DEATH'S MODS",
                boxTitle: "$250",
                boxSubtitle: "current wallet",
                cmdMain: "Change Language",
                langIndicator: "JP",
                btnWhatWeDo: "WHAT WE DO",
                btnGetInTouch: "GET IN TOUCH",
                btnAboutUs: "ABOUT US",
                contentHeader: "DETAILS",
                content: {
                    'what-we-do': 'UPGRADE 8GB VRAM TO 16GB VRAM',
                    'get-in-touch': 'XYZ@GMAIL.COM',
                    'about-us': 'XYZ'
                }
            }
        };

        let currentLang = 'jp';
        let currentContentId = null;

        function selectMenu(id, btnElement) {
            currentContentId = id;
            
            document.querySelectorAll('.p3r-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.querySelector('.bg-pink').classList.add('hidden');
                btn.querySelector('.bg-white').classList.add('hidden');
            });

            btnElement.classList.add('active');
            btnElement.querySelector('.bg-pink').classList.remove('hidden');
            btnElement.querySelector('.bg-white').classList.remove('hidden');

            const contentDisplay = document.getElementById('content-display');
            const contentText = document.getElementById('content-text');
            
            contentDisplay.classList.remove('visible');
            void contentDisplay.offsetWidth; 
            
            contentText.innerText = translations[currentLang].content[id];
            
            contentDisplay.classList.add('visible');
        }

        function toggleLanguage() {
            currentLang = currentLang === 'jp' ? 'en' : 'jp';
            updateUI();
        }

        function updateUI() {
            const t = translations[currentLang];
            
            document.getElementById('bg-vertical-text').innerText = t.bgText;
            document.getElementById('box-title').innerText = t.boxTitle;
            document.getElementById('box-subtitle').innerText = t.boxSubtitle;
            document.getElementById('cmd-main').innerText = t.cmdMain;
            document.getElementById('lang-indicator').innerText = t.langIndicator;
            document.getElementById('content-header').innerText = t.contentHeader;

            document.getElementById('btn-what-we-do').querySelector('.btn-text').innerText = t.btnWhatWeDo;
            document.getElementById('btn-get-in-touch').querySelector('.btn-text').innerText = t.btnGetInTouch;
            document.getElementById('btn-about-us').querySelector('.btn-text').innerText = t.btnAboutUs;

            if (currentContentId) {
                document.getElementById('content-text').innerText = t.content[currentContentId];
            }
        }
        
        updateUI();
    </script>
</body>
</html>
